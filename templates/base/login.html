<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Acceso | AdmiDent</title>

  <!-- Fuentes -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:      #2db87a;
      --accent-mid:  #52cb94;
      --green-deep:  #1a8a59;
      --text-1:      #2c3a34;
      --text-2:      #5a7268;
      --text-3:      #94b3a8;
      --border:      #c8e8da;
      --radius:      16px;
    }

    html, body {
      height: 100%;
      font-family: 'Roboto', sans-serif;
      overflow: hidden;          /* canvas cubre todo el fondo */
    }

    /* ── Canvas fractal de fondo ─────────────────── */
    #defaultCanvas0 {
      position: fixed !important;
      top: 0; left: 0;
      width: 100% !important;
      height: 100% !important;
      z-index: 0;
      display: block;
    }

    /* ── Contenedor centrado ─────────────────────── */
    .login-wrap {
      position: relative;
      z-index: 10;
      min-height: 100dvh;           /* dynamic viewport height — respeta barra móvil */
      display: flex;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top, 1rem)
               env(safe-area-inset-right, 1rem)
               env(safe-area-inset-bottom, 1rem)
               env(safe-area-inset-left, 1rem);
      padding-top: max(env(safe-area-inset-top), 1rem);
      padding-bottom: max(env(safe-area-inset-bottom), 1rem);
    }

    /* ── Card ────────────────────────────────────── */
    .login-card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(20px) saturate(1.6);
      -webkit-backdrop-filter: blur(20px) saturate(1.6);
      border: 1.5px solid rgba(45, 184, 122, 0.28);
      border-radius: 24px;
      padding: 2.4rem 2rem 2rem;
      box-shadow:
        0 24px 64px rgba(45, 184, 122, 0.20),
        0 4px 20px rgba(0, 0, 0, 0.07);
      animation: cardIn .55s cubic-bezier(.4, 0, .2, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1);   }
    }

    /* ── Logo ────────────────────────────────────── */
    .logo-icon {
      width: 68px; height: 68px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-mid) 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.9rem; color: #fff;
      margin: 0 auto .9rem;
      box-shadow: 0 8px 28px rgba(45, 184, 122, .42);
      animation: pulse 2.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 8px 28px rgba(45,184,122,.42); }
      50%       { box-shadow: 0 8px 40px rgba(45,184,122,.68); }
    }

    .logo-title {
      font-size: 1.9rem;
      font-weight: 700;
      color: var(--green-deep);
      letter-spacing: -.02em;
      margin-bottom: .15rem;
      text-align: center;
    }

    .logo-sub {
      font-size: .88rem;
      color: var(--text-2);
      text-align: center;
      margin-bottom: 1.8rem;
    }

    /* ── Form inputs ─────────────────────────────── */
    .form-label {
      font-size: .9rem;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: .4rem;
    }

    .form-control {
      background: rgba(255,255,255,.9);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text-1);
      font-size: 1rem;
      /* Mínimo 48px de altura — estándar de accesibilidad táctil */
      min-height: 48px;
      padding: .6rem .95rem;
      transition: border-color .2s, box-shadow .2s;
      width: 100%;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(45,184,122,.18);
      background: #fff;
    }

    .form-control::placeholder { color: var(--text-3); }

    /* ── Error alert ─────────────────────────────── */
    .login-error {
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.25);
      border-radius: 10px;
      color: #991b1b;
      font-size: .9rem;
      padding: .65rem .9rem;
      margin-bottom: 1.2rem;
      display: flex; align-items: center; gap: .5rem;
    }

    /* ── Submit button ───────────────────────────── */
    .btn-login {
      width: 100%;
      min-height: 50px;
      font-size: 1.02rem;
      font-weight: 600;
      letter-spacing: .02em;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-mid) 100%);
      color: #fff;
      box-shadow: 0 4px 16px rgba(45,184,122,.38);
      transition: all .2s;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-login:hover   { background: linear-gradient(135deg, var(--green-deep) 0%, var(--accent) 100%); transform: translateY(-1px); }
    .btn-login:active  { transform: scale(.98); }

    /* ── Toggle password ─────────────────────────── */
    .pwd-wrap { position: relative; }
    .pwd-toggle {
      position: absolute;
      right: .9rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-3);
      font-size: 1rem;
      cursor: pointer;
      padding: .3rem;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Footer ──────────────────────────────────── */
    .login-footer {
      text-align: center;
      margin-top: 1.4rem;
      font-size: .78rem;
      color: var(--text-3);
    }

    /* ── Responsive ajustes ──────────────────────── */
    @media (max-width: 480px) {
      .login-card {
        padding: 2rem 1.4rem 1.75rem;
        border-radius: 20px;
        /* En pantallas muy pequeñas — ocupa casi todo el ancho */
        margin: 0 .5rem;
      }
      .logo-icon  { width: 60px; height: 60px; font-size: 1.65rem; border-radius: 17px; }
      .logo-title { font-size: 1.65rem; }
    }

    @media (max-height: 600px) and (orientation: landscape) {
      /* Landscape móvil: reducir espacios y logo */
      .login-wrap { align-items: flex-start; padding-top: .75rem; overflow-y: auto; }
      .logo-icon  { width: 48px; height: 48px; font-size: 1.35rem; margin-bottom: .5rem; }
      .logo-title { font-size: 1.4rem; }
      .logo-sub   { margin-bottom: 1rem; }
      .login-card { padding: 1.4rem 1.6rem; }
    }
  </style>
</head>

<body>

<!-- p5.js fractal — se monta automáticamente en document.body -->
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.3/lib/p5.min.js"></script>
<script>
/* ══════════════════════════════════════════════════════════════
   FRACTAL FORESTAL ANIMADO — p5.js
   Árboles fractales con ramas oscilantes y partículas flotantes
   ══════════════════════════════════════════════════════════════ */
new p5(function (p) {

  // Paleta de colores verdes / dental
  const COLS = [
    [45,  184, 122],   // verde accent
    [34,  197, 94],    // verde vivo
    [6,   182, 212],   // cyan
    [52,  211, 153],   // menta
    [16,  185, 129],   // esmeralda
    [82,  203, 148],   // verde claro
    [20,  184, 166],   // teal
  ];

  // Partículas que flotan desde las hojas
  const particles = [];
  const MAX_PART  = 120;

  // Tiempo de animación
  let t = 0;

  /* ── Setup ──────────────────────────────────────── */
  p.setup = function () {
    const cnv = p.createCanvas(p.windowWidth, p.windowHeight);
    cnv.style('position', 'fixed');
    cnv.style('top', '0');
    cnv.style('left', '0');
    cnv.style('z-index', '0');
    p.colorMode(p.RGB, 255, 255, 255, 1);
    p.strokeCap(p.ROUND);
  };

  p.windowResized = function () {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
  };

  /* ── Árbol fractal recursivo ─────────────────────── */
  function branch(x, y, angle, len, depth, ci) {
    if (depth === 0 || len < 2) return;

    const x2 = x + p.cos(angle) * len;
    const y2 = y + p.sin(angle) * len;

    // Opacidad y grosor según profundidad
    const alpha = p.constrain(0.12 + depth * 0.075, 0.1, 0.85);
    const sw    = p.max(0.4, depth * 0.5);
    const col   = COLS[ci % COLS.length];

    p.stroke(col[0], col[1], col[2], alpha);
    p.strokeWeight(sw);
    p.line(x, y, x2, y2);

    // Emitir partícula desde las puntas (hojas)
    if (depth <= 2 && particles.length < MAX_PART && p.random() < 0.004) {
      particles.push({
        x: x2, y: y2,
        vx: p.random(-0.6, 0.6),
        vy: p.random(-1.2, -0.3),
        life: 1.0,
        col: col,
        r: p.random(1.5, 3.5),
      });
    }

    // Oscilación con el tiempo — viento suave
    const sway  = p.sin(t * 0.7 + depth * 0.5 + x * 0.003) * 0.2;
    const split = 0.40 + p.abs(sway) * 0.06;
    const ratio = 0.70;

    branch(x2, y2, angle - split + sway, len * ratio, depth - 1, ci + 1);
    branch(x2, y2, angle + split + sway, len * ratio, depth - 1, ci + 2);
  }

  /* ── Posiciones de los árboles ───────────────────── */
  function trees() {
    const W = p.width, H = p.height;
    // En móvil reducimos profundidad para mayor rendimiento
    const isMobile = W < 768;
    const dMain = isMobile ? 9 : 11;
    const dSec  = isMobile ? 7 : 9;
    const dMini = isMobile ? 5 : 7;

    return [
      { x: W * .50, y: H,        a: -p.HALF_PI,          len: H * .22, d: dMain, ci: 0 },
      { x: W * .22, y: H,        a: -p.HALF_PI + .12,    len: H * .17, d: dSec,  ci: 1 },
      { x: W * .78, y: H,        a: -p.HALF_PI - .12,    len: H * .17, d: dSec,  ci: 3 },
      { x: W * .05, y: H,        a: -p.HALF_PI + .28,    len: H * .13, d: dSec,  ci: 2 },
      { x: W * .95, y: H,        a: -p.HALF_PI - .28,    len: H * .13, d: dSec,  ci: 4 },
      { x: W * .38, y: H,        a: -p.HALF_PI + .06,    len: H * .14, d: dSec,  ci: 5 },
      { x: W * .62, y: H,        a: -p.HALF_PI - .06,    len: H * .14, d: dSec,  ci: 6 },
      { x: W * .12, y: H * .82,  a: -p.HALF_PI + .40,    len: H * .07, d: dMini, ci: 5 },
      { x: W * .88, y: H * .82,  a: -p.HALF_PI - .40,    len: H * .07, d: dMini, ci: 6 },
    ];
  }

  /* ── Partículas ──────────────────────────────────── */
  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const pt = particles[i];
      pt.x  += pt.vx;
      pt.y  += pt.vy;
      pt.vy -= 0.012;          // leve aceleración hacia arriba
      pt.vx += p.sin(t * 2 + i) * 0.02; // deriva lateral suave
      pt.life -= 0.008;

      if (pt.life <= 0) { particles.splice(i, 1); continue; }

      const a = pt.life * 0.9;
      p.noStroke();
      p.fill(pt.col[0], pt.col[1], pt.col[2], a);
      p.circle(pt.x, pt.y, pt.r * 2);

      // Halo glow
      p.fill(pt.col[0], pt.col[1], pt.col[2], a * 0.25);
      p.circle(pt.x, pt.y, pt.r * 5);
    }
  }

  /* ── Draw loop ───────────────────────────────────── */
  p.draw = function () {
    // Fondo degradado verde pastel
    p.background(232, 247, 240);   // #e8f7f0

    // Suave capa de desvanecimiento para trail effect
    p.fill(244, 250, 247, 0.6);    // #f4faf7 con alpha
    p.noStroke();
    p.rect(0, 0, p.width, p.height);

    // Dibujar todos los árboles
    trees().forEach(tr => {
      branch(tr.x, tr.y, tr.a, tr.len, tr.d, tr.ci);
    });

    // Partículas
    updateParticles();

    t += 0.013;
  };
});
</script>

<!-- Contenido de login -->
<div class="login-wrap">
  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo" style="text-align:center;margin-bottom:1.6rem">
      <div class="logo-icon">
        <i class="fa-solid fa-tooth"></i>
      </div>
      <div class="logo-title">AdmiDent</div>
      <div class="logo-sub">Sistema de Gestión Dental</div>
    </div>

    <!-- Formulario -->
    <form method="post" autocomplete="on">
      {% csrf_token %}

      {% if form.errors %}
      <div class="login-error">
        <i class="fa-solid fa-triangle-exclamation"></i>
        Usuario o contraseña incorrectos.
      </div>
      {% endif %}

      <!-- Usuario -->
      <div class="mb-3">
        <label class="form-label">
          <i class="fa-solid fa-user me-1" style="color:var(--accent)"></i>Usuario
        </label>
        <input type="text" name="username" class="form-control"
               autocomplete="username" autofocus
               placeholder="Ingresa tu usuario">
      </div>

      <!-- Contraseña -->
      <div class="mb-4">
        <label class="form-label">
          <i class="fa-solid fa-lock me-1" style="color:#06b6d4"></i>Contraseña
        </label>
        <div class="pwd-wrap">
          <input type="password" name="password" id="pwdInput" class="form-control"
                 autocomplete="current-password"
                 placeholder="••••••••"
                 style="padding-right:3rem">
          <button type="button" class="pwd-toggle" id="pwdToggle" aria-label="Mostrar/ocultar contraseña">
            <i class="fa-solid fa-eye-slash" id="pwdEye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login">
        <i class="fa-solid fa-right-to-bracket me-2"></i>Ingresar al sistema
      </button>
    </form>

    <!-- Footer -->
    <div class="login-footer">
      <i class="fa-solid fa-shield-halved me-1" style="color:var(--accent)"></i>
      Acceso seguro &nbsp;·&nbsp; AdmiDent v2.0
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* Toggle contraseña */
const pwdToggle = document.getElementById('pwdToggle');
const pwdInput  = document.getElementById('pwdInput');
const pwdEye    = document.getElementById('pwdEye');
if (pwdToggle) {
  pwdToggle.addEventListener('click', () => {
    const visible = pwdInput.type === 'text';
    pwdInput.type = visible ? 'password' : 'text';
    pwdEye.className = visible ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
  });
}
</script>
</body>
</html>
